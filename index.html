<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080b0a" />
    <title>音信 · QQ音乐 Demo</title>
    <style>
      .file-launcher {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #f5f8f6;
        background: radial-gradient(circle at 50% 20%, #153724, #080b0a 42%, #020403);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }
      .file-launcher__card {
        width: min(100%, 420px);
        padding: 38px 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        text-align: center;
      }
      .file-launcher__mark {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        margin: 0 auto 22px;
        color: #052112;
        background: #20e676;
        border-radius: 50%;
        font-size: 28px;
      }
      .file-launcher h1 { margin: 0; font-family: "Songti SC", serif; font-size: 28px; font-weight: 500; }
      .file-launcher p { margin: 12px 0 24px; color: rgba(245, 248, 246, 0.62); font-size: 14px; line-height: 1.7; }
      .file-launcher ol { margin: 0; padding: 18px 22px 18px 42px; color: rgba(245, 248, 246, 0.82); background: rgba(0, 0, 0, 0.22); border-radius: 16px; text-align: left; font-size: 13px; line-height: 2; }
      .file-launcher code { color: #20e676; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .file-launcher a { display: inline-block; margin-top: 22px; color: #08110c; background: #20e676; padding: 12px 22px; border-radius: 999px; font-size: 14px; font-weight: 700; text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.location.protocol === 'file:') {
        document.getElementById('root').innerHTML = `
          <main class="file-launcher">
            <section class="file-launcher__card">
              <div class="file-launcher__mark">♫</div>
              <h1>音信 Demo 需要启动本地服务</h1>
              <p>这是 React + Vite 应用，浏览器不能通过 file:// 直接加载 TypeScript 模块。</p>
              <ol>
                <li>双击同目录的 <code>启动音信.command</code></li>
                <li>终端启动后，浏览器会自动打开 Demo</li>
              </ol>
              <a href="http://127.0.0.1:5173">服务已启动？打开音信</a>
            </section>
          </main>`;
      }
    </script>
    <script type="module">
      if (window.location.protocol !== 'file:') {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
